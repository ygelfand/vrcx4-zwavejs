<?xml version="1.0" encoding="UTF-8"?>
<!-- Source art for the vrcx4 HACS brand logo: the keypad mark plus a "VRCX4"
     wordmark and subtitle. Height-normalized to 256; rasterized by `make brand`. -->
<svg width="560" height="256" viewBox="0 0 560 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="plate" x1="56" y1="20" x2="184" y2="236" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#39424E"/>
      <stop offset="1" stop-color="#222932"/>
    </linearGradient>
    <linearGradient id="btn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4A5563"/>
      <stop offset="1" stop-color="#333C47"/>
    </linearGradient>
    <linearGradient id="btnActive" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5B6675"/>
      <stop offset="1" stop-color="#3C4753"/>
    </linearGradient>
    <radialGradient id="ledOn" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#9BFFB0"/>
      <stop offset="0.45" stop-color="#3DDC6E"/>
      <stop offset="1" stop-color="#23A552"/>
    </radialGradient>
    <filter id="ledGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="3.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- keypad mark (same geometry as icon.svg) -->
  <g>
    <rect x="48" y="20" width="144" height="216" rx="26" fill="url(#plate)" stroke="#12161C" stroke-width="2"/>
    <rect x="53" y="25" width="134" height="206" rx="21" fill="none" stroke="#5A6573" stroke-width="1.5" opacity="0.5"/>
    <rect x="70" y="40"  width="100" height="40" rx="11" fill="url(#btnActive)" stroke="#12161C" stroke-width="1.5"/>
    <rect x="70" y="92"  width="100" height="40" rx="11" fill="url(#btn)" stroke="#12161C" stroke-width="1.5"/>
    <rect x="70" y="144" width="100" height="40" rx="11" fill="url(#btn)" stroke="#12161C" stroke-width="1.5"/>
    <rect x="70" y="196" width="100" height="40" rx="11" fill="url(#btn)" stroke="#12161C" stroke-width="1.5"/>
    <circle cx="84" cy="60"  r="5.5" fill="url(#ledOn)" filter="url(#ledGlow)"/>
    <circle cx="84" cy="112" r="4.5" fill="#283039" stroke="#1B2128" stroke-width="1"/>
    <circle cx="84" cy="164" r="4.5" fill="#283039" stroke="#1B2128" stroke-width="1"/>
    <circle cx="84" cy="216" r="4.5" fill="#283039" stroke="#1B2128" stroke-width="1"/>
  </g>

  <!-- wordmark -->
  <text x="228" y="138" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="84" font-weight="800" letter-spacing="2" fill="#2B333D">VRCX4</text>
  <text x="230" y="178" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="23" font-weight="600" letter-spacing="3.5" fill="#3DDC6E">SCENE CONTROLLER</text>
</svg>
